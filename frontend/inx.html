<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket & Inventory System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎫 Ticket & Inventory System</h1>
    <span>👤 Admin</span>
  </header>

  <nav>
    <button class="active" onclick="show('dashboard')">📊 Dashboard</button>
    <button onclick="show('tickets')">🎫 Tickets</button>
    <button onclick="show('inventory')">📦 Inventory</button>
  </nav>

  <main>
    <!-- Dashboard -->
    <section id="dashboard" class="section active">
      <div class="stats">
        <div class="card">
          <h3>Open Tickets</h3>
          <p id="dashOpen">0</p>
        </div>
        <div class="card">
          <h3>Inventory Items</h3>
          <p id="dashItems">0</p>
        </div>
        <div class="card">
          <h3>Low Stock</h3>
          <p id="dashLow" class="text-warning">0</p>
        </div>
        <div class="card">
          <h3>Resolved</h3>
          <p id="dashResolved" class="text-success">0</p>
        </div>
      </div>
    </section>

    <!-- Tickets -->
    <section id="tickets" class="section">
      <div class="form-box">
        <h3>Create Ticket</h3>
        <br>
        <div class="form-row">
          <input type="text" id="tTitle" placeholder="Title">
          <select id="tPriority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>
        <textarea id="tDesc" placeholder="Description" rows="3"></textarea>
        <br><br>
        <button class="btn" onclick="addTicket()">Submit</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ticketTable"></tbody>
      </table>
    </section>

    <!-- Inventory -->
    <section id="inventory" class="section">
      <div class="form-box">
        <h3>Add Item</h3>
        <br>
        <div class="form-row">
          <input type="text" id="iName" placeholder="Item Name">
          <input type="number" id="iStock" placeholder="Stock">
        </div>
        <div class="form-row">
          <input type="number" id="iThreshold" placeholder="Min Threshold" value="5">
          <button class="btn" onclick="addItem()">Add Item</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Stock</th>
            <th>Threshold</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="invTable"></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
